<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balloon Popper Brain Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e1a;
    --surface: #16162a;
    --surface-2: #1e1e38;
    --border: #2c2c50;
    --text: #f0eef6;
    --text-muted: #8a87a8;
    --gold: #ffd96a;
    --silver: #c0c7d6;
    --bronze: #e0965a;
    --pink: #ff6eb4;
    --cyan: #5af0e8;
    --purple: #a87cff;
    --red: #ff6b6b;
    --green: #6bffa8;
    --radius: 16px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* --- Floating balloons background --- */
  .balloons-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .balloon {
    position: absolute;
    width: 40px; height: 50px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity: 0.12;
    bottom: -60px;
    animation: floatUp linear infinite;
  }
  .balloon::after {
    content: '';
    position: absolute;
    bottom: -12px; left: 50%;
    transform: translateX(-50%);
    width: 1px; height: 14px;
    background: inherit; opacity: 0.5;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(calc(-100vh - 120px)) rotate(15deg); }
  }

  /* --- Layout --- */
  .container {
    position: relative; z-index: 1;
    max-width: 640px; margin: 0 auto;
    padding: 50px 20px 80px;
  }

  /* --- Header --- */
  .header { text-align: center; margin-bottom: 40px; }
  .header .emoji { font-size: 48px; margin-bottom: 12px; display: block; }
  .header h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(26px, 5vw, 38px);
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.2;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--pink), var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p { color: var(--text-muted); font-size: 14px; }
  .live-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.8); }
  }

  /* --- Podium (Top 3) --- */
  .podium {
    display: flex; justify-content: center; align-items: flex-end;
    gap: 12px; margin-bottom: 32px;
    min-height: 200px;
  }
  .podium-slot {
    display: flex; flex-direction: column; align-items: center;
    animation: fadeUp 0.5s ease both;
  }
  .podium-slot:nth-child(1) { animation-delay: 0.2s; }
  .podium-slot:nth-child(2) { animation-delay: 0.05s; }
  .podium-slot:nth-child(3) { animation-delay: 0.35s; }

  .podium-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; font-family: 'Fredoka', sans-serif;
    margin-bottom: 8px; border: 3px solid transparent;
    color: var(--bg);
  }
  .podium-slot.gold .podium-avatar   { background: var(--gold); border-color: #ffe9a0; }
  .podium-slot.silver .podium-avatar { background: var(--silver); border-color: #dde1ea; }
  .podium-slot.bronze .podium-avatar { background: var(--bronze); border-color: #f0be8a; }

  .podium-name {
    font-family: 'Fredoka', sans-serif;
    font-size: 14px; font-weight: 600;
    margin-bottom: 4px; text-align: center;
    max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .podium-score {
    font-size: 12px; color: var(--text-muted); margin-bottom: 10px;
    font-weight: 600;
  }
  .podium-bar {
    width: 90px; border-radius: 10px 10px 0 0;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 10px; font-family: 'Fredoka', sans-serif;
    font-size: 20px; font-weight: 700;
  }
  .podium-slot.gold .podium-bar   { height: 100px; background: linear-gradient(180deg, rgba(255,217,106,0.25), rgba(255,217,106,0.05)); color: var(--gold); }
  .podium-slot.silver .podium-bar { height: 75px;  background: linear-gradient(180deg, rgba(192,199,214,0.2), rgba(192,199,214,0.04)); color: var(--silver); }
  .podium-slot.bronze .podium-bar { height: 55px;  background: linear-gradient(180deg, rgba(224,150,90,0.2), rgba(224,150,90,0.04));  color: var(--bronze); }

  /* --- Table (rest of leaderboard) --- */
  .table-wrapper {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .table-header {
    display: grid; grid-template-columns: 56px 1fr 100px;
    padding: 14px 20px; font-size: 11px; font-weight: 700;
    letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text-muted); border-bottom: 1px solid var(--border);
  }
  .table-row {
    display: grid; grid-template-columns: 56px 1fr 100px;
    padding: 14px 20px; align-items: center;
    border-bottom: 1px solid rgba(44,44,80,0.4);
    transition: background 0.15s;
    animation: fadeUp 0.35s ease both;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: var(--surface-2); }
  .table-rank {
    font-family: 'Fredoka', sans-serif;
    font-size: 15px; font-weight: 600; color: var(--text-muted);
  }
  .table-name { font-size: 14px; font-weight: 600; }
  .table-score {
    font-family: 'Fredoka', sans-serif;
    font-size: 15px; font-weight: 600; color: var(--purple);
    text-align: right;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* --- Empty / Error / Loading --- */
  .msg-box {
    text-align: center; padding: 48px 20px;
    color: var(--text-muted); font-size: 15px; display: none;
  }
  .msg-box.error { color: var(--red); }
  .msg-box.visible { display: block; }

  .spinner { display: none; text-align: center; padding: 48px 0; }
  .spinner.visible { display: block; }
  .spinner .dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    margin: 0 5px; animation: bounce 1.2s infinite ease-in-out;
  }
  .spinner .dot:nth-child(1) { background: var(--pink); }
  .spinner .dot:nth-child(2) { background: var(--cyan); animation-delay: 0.15s; }
  .spinner .dot:nth-child(3) { background: var(--purple); animation-delay: 0.3s; }
  @keyframes bounce {
    0%,80%,100% { transform: scale(0.4); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
  }

  .refresh-note {
    text-align: center; margin-top: 24px;
    font-size: 12px; color: var(--text-muted); opacity: 0.5;
  }

  @media (max-width: 480px) {
    .podium-bar { width: 70px; }
    .podium-avatar { width: 44px; height: 44px; font-size: 18px; }
    .table-header, .table-row { grid-template-columns: 44px 1fr 80px; padding: 12px 14px; }
  }
</style>
</head>
<body>

<div class="balloons-bg" id="balloonsBg"></div>

<div class="container">
  <div class="header">
    <span class="emoji">🎈</span>
    <h1>Balloon Popper Brain</h1>
    <p><span class="live-dot"></span>Live leaderboard &middot; updates automatically</p>
  </div>

  <div class="spinner visible" id="spinner">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>

  <div class="msg-box" id="msgBox"></div>

  <div id="content" style="display:none;">
    <div class="podium" id="podium"></div>
    <div class="table-wrapper" id="tableWrapper" style="display:none;">
      <div class="table-header">
        <div>#</div>
        <div>Name</div>
        <div style="text-align:right">Score</div>
      </div>
      <div id="tableBody"></div>
    </div>
  </div>

  <div class="refresh-note" id="refreshNote" style="display:none;">Auto-refreshes every 30 seconds</div>
</div>

<script>
// =====================================================
// TODO: Replace with your Leaderboard Apps Script URL
// =====================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbwmkXtSTP7ZDDS6IBy94mR2gyrsznfRDRWqXBgn_Uh5ads7IyhTg0_W5HSefUkgKzJV/exec';

const spinnerEl   = document.getElementById('spinner');
const msgBox      = document.getElementById('msgBox');
const contentEl   = document.getElementById('content');
const podiumEl    = document.getElementById('podium');
const tableWrap   = document.getElementById('tableWrapper');
const tableBody   = document.getElementById('tableBody');
const refreshNote = document.getElementById('refreshNote');

// --- Floating balloons ---
const colors = ['#ff6eb4','#5af0e8','#a87cff','#ffd96a','#ff6b6b','#6bffa8'];
const balloonsBg = document.getElementById('balloonsBg');
function spawnBalloon() {
  const b = document.createElement('div');
  b.className = 'balloon';
  b.style.left = Math.random() * 100 + '%';
  b.style.background = colors[Math.floor(Math.random() * colors.length)];
  b.style.animationDuration = (8 + Math.random() * 10) + 's';
  b.style.width = (30 + Math.random() * 25) + 'px';
  b.style.height = (38 + Math.random() * 30) + 'px';
  balloonsBg.appendChild(b);
  b.addEventListener('animationend', () => b.remove());
}
setInterval(spawnBalloon, 1200);
for (let i = 0; i < 6; i++) setTimeout(spawnBalloon, i * 300);

// --- Fetch leaderboard ---
async function fetchLeaderboard() {
  try {
    const res = await fetch(API_URL);
    const json = await res.json();

    spinnerEl.classList.remove('visible');

    if (!json.success) {
      showMsg(json.error || 'Failed to load leaderboard.', true);
      return;
    }

    const entries = json.leaderboard;
    if (entries.length === 0) {
      showMsg('No entries yet — be the first! 🎈', false);
      return;
    }

    renderLeaderboard(entries);
  } catch (err) {
    spinnerEl.classList.remove('visible');
    showMsg('Network error. Retrying…', true);
  }
}

function showMsg(text, isError) {
  msgBox.textContent = text;
  msgBox.className = 'msg-box visible' + (isError ? ' error' : '');
  contentEl.style.display = 'none';
}

function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function renderLeaderboard(entries) {
  msgBox.classList.remove('visible');
  contentEl.style.display = 'block';
  refreshNote.style.display = 'block';

  // --- Podium (top 3) ---
  podiumEl.innerHTML = '';
  const top3 = entries.slice(0, 3);
  const podiumOrder = [1, 0, 2]; // Silver, Gold, Bronze (visual layout)
  const classes = ['gold', 'silver', 'bronze'];
  const medals  = ['🥇', '🥈', '🥉'];

  podiumOrder.forEach(idx => {
    if (!top3[idx]) return;
    const e = top3[idx];
    const slot = document.createElement('div');
    slot.className = `podium-slot ${classes[idx]}`;
    slot.innerHTML = `
      <div class="podium-avatar">${getInitials(e.name)}</div>
      <div class="podium-name" title="${e.name}">${e.name}</div>
      <div class="podium-score">${Math.round(e.score * 100) / 100} pts</div>
      <div class="podium-bar">${medals[idx]}</div>
    `;
    podiumEl.appendChild(slot);
  });

  // --- Table (4th place onwards) ---
  const rest = entries.slice(3);
  if (rest.length > 0) {
    tableWrap.style.display = 'block';
    tableBody.innerHTML = '';
    rest.forEach((e, i) => {
      const row = document.createElement('div');
      row.className = 'table-row';
      row.style.animationDelay = (i * 0.04) + 's';
      row.innerHTML = `
        <div class="table-rank">${i + 4}</div>
        <div class="table-name">${e.name}</div>
        <div class="table-score">${Math.round(e.score * 100) / 100}</div>
      `;
      tableBody.appendChild(row);
    });
  } else {
    tableWrap.style.display = 'none';
  }
}

// Initial load
fetchLeaderboard();

// Auto-refresh every 30 seconds
setInterval(fetchLeaderboard, 30000);
</script>

</body>
</html>
